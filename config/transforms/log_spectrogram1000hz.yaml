# @package _global_
to_tensor:
  _target_: emg2qwerty.transforms.ToTensor
  fields: [emg_left, emg_right]

downsample:
  _target_: emg2qwerty.transforms.TemporalDownsample
  factor: 2   # 2000Hz / 2 = 1000Hz

band_rotation:
  _target_: emg2qwerty.transforms.ForEach
  transform:
    _target_: emg2qwerty.transforms.RandomBandRotation
    offsets: [-1, 0, 1]

temporal_jitter:
  _target_: emg2qwerty.transforms.TemporalAlignmentJitter
  max_offset: 60   # halved from 120 because signal is now at 1000Hz

logspec:
  _target_: emg2qwerty.transforms.LogSpectrogram
  n_fft: 32        # halved from 64 — same real-time window at 1000Hz
  hop_length: 8    # halved from 16 — still gives 125 output timesteps/sec

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 3
  time_mask_param: 25
  n_freq_masks: 2
  freq_mask_param: 4

transforms:
  train:
    - ${downsample}      
    - ${to_tensor}
    - ${band_rotation}
    - ${temporal_jitter}
    - ${logspec}
    - ${specaug}

  val:
    - ${downsample}     
    - ${to_tensor}
    - ${logspec}

  test: ${transforms.val}